<!DOCTYPE html>
<html>
<head>
<title>BAYTK Real Estate</title>
<style>
  /* تنسيق عام للصفحة والخلفية */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    /* صورة خلفية تشبه المدينة في الليل */
    background-image: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    height: 100vh;
    color: white;
  }

  /* شريط التنقل العلوي */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(0, 0, 0, 0.4); /* خلفية شفافة قليلاً للشريط */
  }

  .logo {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    color: white;
    text-decoration: none;
    font-size: 14px;
  }

  .nav-links a:hover {
    text-decoration: underline;
  }

  /* المحتوى وسط الصفحة (العنوان والبحث) */
  .hero-content {
    text-align: center;
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
  }

  .hero-content h1 {
    font-size: 45px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
  }

  .hero-content p {
    font-size: 18px;
    margin-bottom: 30px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
  }

  /* تنسيق خانة البحث */
  .search-box {
    display: inline-flex;
    background: white;
    padding: 5px;
    border-radius: 5px;
    overflow: hidden;
    width: 60%;
    max-width: 500px;
  }

  .search-box input {
    border: none;
    padding: 12px;
    font-size: 16px;
    outline: none;
    flex-grow: 1;
  }

  .search-box button {
    background-color: #111b2b;
    color: white;
    border: none;
    padding: 12px 25px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 3px;
  }

  .search-box button:hover {
    background-color: #22344f;
  }
</style>
</head>
<body>

<!-- شريط التنقل العلوي -->
<div class="navbar">
  <div class="logo">BAYTK</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Buy</a></li>
    <li><a href="#">Rent</a></li>
    <li><a href="#">Properties</a></li>
    <li><a href="#">Marketing</a></li>
    <li><a href="#">About Us</a></li>
    <li><a href="#">Log In</a></li>
  </ul>
</div>

<!-- المحتوى المنتصف (العنوان والبحث) -->
<div class="hero-content">
  <h1>Find Your Dream House</h1>
  <p>Buy, Sell & Rent Properties Across Saudi Arabia</p>
  
  <div class="search-box">
    <input type="text" placeholder="Search by city, district or property">
    <button>Search</button>
  </div>
</div>

</body>
</html>
