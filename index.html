<!DOCTYPE html>
<html>
<head>
<title>BAYTK Real Estate</title>
<style>
  /* تنسيق عام للصفحة */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
  }

  /* القسم الرئيسي العلوي (Hero Section) */
  .hero {
    background-image: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    height: 90vh;
    color: white;
    position: relative;
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(0, 0, 0, 0.4);
  }

  .logo {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    color: white;
    text-decoration: none;
    font-size: 14px;
  }

  .nav-links a:hover {
    text-decoration: underline;
  }

  .hero-content {
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
  }

  .hero-content h1 {
    font-size: 45px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
  }

  .hero-content p {
    font-size: 18px;
    margin-bottom: 30px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
  }

  .search-box {
    display: inline-flex;
    background: white;
    padding: 5px;
    border-radius: 5px;
    overflow: hidden;
    width: 60%;
    max-width: 500px;
  }

  .search-box input {
    border: none;
    padding: 12px;
    font-size: 16px;
    outline: none;
    flex-grow: 1;
  }

  .search-box button {
    background-color: #111b2b;
    color: white;
    border: none;
    padding: 12px 25px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 3px;
  }

  .search-box button:hover {
    background-color: #22344f;
  }

  /* قسم العقارات المميزة تحت */
  .properties-section {
    padding: 50px 20px;
    text-align: center;
  }

  .properties-section h2 {
    font-size: 32px;
    margin-bottom: 30px;
    color: #222;
  }

  .property-grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }

  .property-card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    width: 300px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: left;
  }

  .property-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }

  .property-info {
    padding: 15px;
  }

  .property-info h3 {
    margin: 0 0 10px 0;
    font-size: 20px;
    color: #333;
  }

  .property-info p {
    margin: 0;
    color: #666;
    font-size: 15px;
  }
</style>
</head>
<body>

<!-- القسم الرئيسي -->
<div class="hero">
  <div class="navbar">
    <div class="logo">BAYTK</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Buy</a></li>
      <li><a href="#">Rent</a></li>
      <li><a href="#">Properties</a></li>
      <li><a href="#">Marketing</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Log In</a></li>
    </ul>
  </div>

  <div class="hero-content">
    <h1>Find Your Dream House</h1>
    <p>Buy, Sell & Rent Properties Across Saudi Arabia</p>
    
    <div class="search-box">
      <input type="text" placeholder="Search by city, district or property">
      <button>Search</button>
    </div>
  </div>
</div>

<!-- قسم العقارات المميزة -->
<div class="properties-section">
  <h2>Featured Properties</h2>
  <div class="property-grid">
    
    <!-- عقار 1 -->
    <div class="property-card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600&q=80" alt="Modern Villa">
      <div class="property-info">
        <h3>Modern Villa</h3>
        <p>Riyadh - $500,000</p>
      </div>
    </div>

    <!-- عقار 2 -->
    <div class="property-card">
      <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=600&q=80" alt="Luxury Apartment">
      <div class="property-info">
        <h3>Luxury Apartment</h3>
        <p>Jeddah - $1,200 / month</p>
      </div>
    </div>

  </div>
</div>

</body>
</html>
